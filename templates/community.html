{% extends 'base.html' %}

{% block title %}
Общение
{% endblock %}

{% block menu %}

{% endblock %}

{% block main %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <h2 class="repo-page-heading mb-4">Чат сообщества</h2>

            <!-- Форма отправки сообщения -->
            <div class="card mb-4">
                <div class="card-body">
                    <form method="POST" action="/community" id="messageForm">
                        <input type="hidden" name="reply_to_id" id="replyToId" value="">
                        <div id="replyPreview" class="alert alert-info d-none mb-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong>Ответ на сообщение:</strong>
                                    <div id="replyPreviewText" class="mt-1"></div>
                                </div>
                                <button type="button" class="btn-close" onclick="cancelReply()"></button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Ваше сообщение</label>
                            <textarea class="form-control" id="message" name="message" rows="3" required placeholder="Введите сообщение..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить</button>
                    </form>
                </div>
            </div>

            <!-- Список сообщений (разметка в partial для автообновления) -->
            <div class="messages-list">
                {% include '_community_messages.html' %}
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var messageForm = document.getElementById('messageForm');
        var messageTextarea = document.getElementById('message');
        if (messageForm && messageTextarea) {
            messageTextarea.addEventListener('keydown', function(e) {
                if (e.key !== 'Enter' || e.shiftKey) {
                    return;
                }
                if (e.isComposing) {
                    return;
                }
                e.preventDefault();
                if (typeof messageForm.requestSubmit === 'function') {
                    messageForm.requestSubmit();
                } else {
                    messageForm.submit();
                }
            });
        }

        var messagesList = document.querySelector('.messages-list');
        var lastMessageIdsJson = JSON.stringify({{ messages|map(attribute='id')|list|tojson }});

        function applyMessagesPartial(incomingIdsJson) {
            var h0 = messagesList.offsetHeight;
            return fetch('/community/messages_partial', { credentials: 'same-origin' })
                .then(function(r) {
                    if (!r.ok) {
                        return Promise.reject();
                    }
                    return r.text();
                })
                .then(function(html) {
                    messagesList.innerHTML = html;
                    lastMessageIdsJson = incomingIdsJson;
                    var h1 = messagesList.offsetHeight;
                    window.scrollBy(0, h1 - h0);
                });
        }

        messagesList.addEventListener('submit', function(e) {
            var form = e.target;
            if (form.tagName !== 'FORM' || (form.getAttribute('action') || '').indexOf('/community/delete/') === -1) {
                return;
            }
            e.preventDefault();
            if (!confirm('Удалить это сообщение?')) {
                return;
            }
            var submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.disabled = true;
            }
            fetch(form.getAttribute('action'), {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                credentials: 'same-origin'
            })
                .then(function(r) {
                    var ct = (r.headers.get('content-type') || '');
                    if (ct.indexOf('application/json') === -1) {
                        return Promise.reject(new Error('not_json'));
                    }
                    return r.json().then(function(data) {
                        return { ok: r.ok, data: data };
                    });
                })
                .then(function(result) {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                    }
                    if (!result.ok) {
                        alert(result.data.error || 'Не удалось удалить сообщение');
                        return;
                    }
                    var incoming = JSON.stringify(result.data.ids);
                    return applyMessagesPartial(incoming);
                })
                .catch(function() {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                    }
                    alert('Ошибка сети или сессия истекла. Обновите страницу.');
                });
        });

        messagesList.addEventListener('click', function(e) {
            var replyBtn = e.target.closest('.reply-btn');
            if (replyBtn) {
                var msgId = replyBtn.getAttribute('data-msg-id');
                var username = replyBtn.getAttribute('data-username');
                var text = replyBtn.getAttribute('data-text');
                document.getElementById('replyToId').value = msgId;
                document.getElementById('replyPreview').classList.remove('d-none');
                var previewText = text.length > 100 ? text.substring(0, 100) + '...' : text;
                document.getElementById('replyPreviewText').innerHTML = '<strong>' + username + ':</strong> ' + previewText;
                document.getElementById('message').focus();
                return;
            }

            var likeBtn = e.target.closest('.like-btn');
            if (likeBtn) {
                var id = likeBtn.getAttribute('data-message-id');
                var button = likeBtn;
                if (button.disabled) {
                    return;
                }
                button.disabled = true;
                fetch('/community/like/' + id, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'same-origin'
                })
                    .then(function(r) {
                        var ct = (r.headers.get('content-type') || '');
                        if (ct.indexOf('application/json') === -1) {
                            return Promise.reject(new Error('not_json'));
                        }
                        return r.json().then(function(data) {
                            return { ok: r.ok, data: data };
                        });
                    })
                    .then(function(result) {
                        button.disabled = false;
                        if (!result.ok) {
                            alert(result.data.error || 'Не удалось изменить лайк');
                            return;
                        }
                        if (result.data.liked) {
                            button.classList.remove('btn-outline-danger');
                            button.classList.add('btn-danger');
                        } else {
                            button.classList.remove('btn-danger');
                            button.classList.add('btn-outline-danger');
                        }
                        var badge = messagesList.querySelector('.like-count[data-message-id="' + id + '"]');
                        if (badge) {
                            badge.textContent = '\u2764\ufe0f ' + result.data.likes_count;
                        }
                    })
                    .catch(function() {
                        button.disabled = false;
                        alert('Ошибка сети или сессия истекла. Обновите страницу.');
                    });
            }
        });

        function syncMessagesFromServer() {
            if (document.hidden) {
                return;
            }
            fetch('/community/poll_ids', { credentials: 'same-origin' })
                .then(function(r) {
                    if (!r.ok) {
                        return Promise.reject();
                    }
                    return r.json();
                })
                .then(function(data) {
                    if (!data || !data.ids) {
                        return;
                    }
                    var incoming = JSON.stringify(data.ids);
                    if (incoming === lastMessageIdsJson) {
                        return;
                    }
                    return applyMessagesPartial(incoming);
                })
                .catch(function() {});
        }

        setInterval(syncMessagesFromServer, 3500);
    });

    function cancelReply() {
        document.getElementById('replyToId').value = '';
        document.getElementById('replyPreview').classList.add('d-none');
    }
</script>
{% endblock %}
